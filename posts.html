---
layout: default
title: posts
---

<div id="post-listing-container">
    {% for post in site.posts %}

        <div id="post-listing">
            <div><h4 id="post-listing-title"><a href="{{ post.url }}"></a>{{ post.title }}</a></h4></div>
            <div id="post-listing-date">{{ post.date | date_to_string }}</div>   
        </div>

    {% endfor %}
</div>

<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="/assets/styles/styles.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

        <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png">
        <link rel="manifest" href="/assets/favicons/site.webmanifest">

        <title>{{ page.title }}</title>
    </head>
    <body>
        <div class="container-lg">
            <h2>
            <div class="row" id="top-part">
                <div class="col-md-1"></div>
                <div class="col-md-6 col-sm-6">
                    <a href="/" class="top-part-title">> shurjo sakib masood</a>
                </div>
                <div class="col-md-4 col-sm-6">
                    <div class=row id="links">
                        <div class="col col-sm-4">
                            <a href="/posts" class="top-part">posts</a>
                        </div>
                        <div class="col col-sm-4">
                            <a href="/github" target="_blank" rel="noreferrer noopener" class="top-part">github</a>
                        </div>
                        <div class="col col-sm-4">
                            <a href="/contact" class="top-part">contact</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-1"></div>
            </div>
            </h2>
            <div class="row">
                <div class="col-1"></div>
                <div class="col-md" id="main-body">
                    {{ content }}
                </div>
                <div class="col-1"></div>
            </div>
        </div>
        <footer class="footer mt-auto">
            <div class="container">
                <span id="footer-custom">Copyright 2024 Shurjo Sakib Masood</span>
            </div>
        </footer>
        <script type="text/x-mathjax-config">
            MathJax.Hub.Config({
              extensions: [
                "MathMenu.js",
                "MathZoom.js",
                "AssistiveMML.js",
                "a11y/accessibility-menu.js"
              ],
              jax: ["input/TeX", "output/CommonHTML"],
              TeX: {
                extensions: [
                  "AMSmath.js",
                  "AMSsymbols.js",
                  "noErrors.js",
                  "noUndefined.js",
                ]
              }
            });
          </script>
        <script type="text/javascript" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
